<!-- ============================================================
     SHARED ENQUIRY MODAL PARTIAL — "Enquire Now"
     Included on every non-homepage page via include-partials.js.
     Wired by assets/js/enquiry-modal.js, styled by enquiry-modal.css.
     ============================================================ -->
<div class="enquiry-modal" id="enquiry-modal" role="dialog" aria-modal="true" aria-label="Enquire Now" hidden>
    <div class="enquiry-modal__overlay" id="enquiry-modal-overlay"></div>
    <div class="enquiry-modal__box">
        <button class="enquiry-modal__close" id="enquiry-modal-close" aria-label="Close">&times;</button>
        <h2 class="enquiry-modal__title">Enquire Now</h2>
        <p class="enquiry-modal__sub">Fill in your details and we'll get back to you within 24 hours.</p>
        <form class="enquiry-modal__form" id="enquiry-modal-form" novalidate>
            <input type="hidden" name="access_key" value="16db1d2e-b7d8-4ed9-979e-c1ff200c1d61">
            <input type="hidden" name="subject" value="New Avana enquiry — website">
            <input type="hidden" name="from_name" value="Avana Website">
            <input type="checkbox" name="botcheck" style="display:none" tabindex="-1">
            <input type="text"  name="name"    placeholder="Your Name *"         required>
            <input type="email" name="email"   placeholder="Email Address *"     required>
            <input type="tel"   name="phone"   placeholder="Mobile Number *"     required>
            <select name="topic" required>
                <option value="" disabled selected>What do you need help with? *</option>
                <option value="oa">OA / Knee Bracing</option>
                <option value="cold">Cold Therapy</option>
                <option value="post-op">Post-Op Recovery</option>
                <option value="spine">Spine Bracing</option>
                <option value="riwo">RIWO Spine / Endoscopic Spine</option>
                <option value="cme">CME / Training Programs</option>
                <option value="general">General Enquiry</option>
            </select>
            <button type="submit" class="btn btn--primary btn--full" id="enquiry-modal-submit">Submit Enquiry</button>
            <p class="enquiry-modal__success" id="enquiry-modal-success" hidden>✓ Thank you! We'll be in touch within 24 hours.</p>
            <p class="enquiry-modal__error"   id="enquiry-modal-error"   hidden>Something went wrong. Email us at <a href="mailto:info@avanasurgical.com">info@avanasurgical.com</a></p>
        </form>
    </div>
</div>
