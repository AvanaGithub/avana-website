<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- pain.html is a backwards-compat redirect to the new /solutions/{slug} URL.
         Replaced as part of the Solutions mega-menu / shared-catalog refactor. -->
    <title>Redirecting… | Avana Surgical</title>
    <meta name="robots" content="noindex">
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var area = (params.get('area') || 'knee').toLowerCase();
            var valid = ['knee', 'spine', 'shoulder', 'elbow', 'foot', 'hip'];
            if (valid.indexOf(area) === -1) area = 'knee';
            window.location.replace('solution-template.html?type=painArea&slug=' + area + window.location.hash);
        })();
    </script>
    <meta http-equiv="refresh" content="0; url=solution-template.html?type=painArea&slug=knee">
</head>
<body>
    <p>Redirecting to <a href="solution-template.html?type=painArea&amp;slug=knee">the knee solutions page</a>…</p>
</body>
</html>
